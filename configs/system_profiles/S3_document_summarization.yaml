system:
  id: S3
  name: "Document Summarization and QA"
  domain: document_intelligence
  deployment_type: production
  study_role: "Case System 3 of 4 - highest SF score in study cohort"

infrastructure:
  llm_provider: google
  llm_model: "gemini-1.5-pro-002"
  context_window_tokens: 1000000 # Long context - full document ingestion
  streaming_enabled: false
  rag_enabled: true
  rag_mode: "long_context_native" # Documents injected directly into context
  rag_max_doc_tokens: 900000
  embedding_model: "text-embedding-004"
  daily_active_users: 1900
  peak_rps: 8
  avg_doc_length_pages: 42
  team_size_dev: 5
  regulatory_context: ["GDPR"]

qalis_metric_applicability:
  FC-1: true
  FC-2: true
  FC-3: false
  FC-4: true
  RO-1: true
  RO-2: true
  RO-3: true
  RO-4: true
  RO-5: true
  SF-1: true
  SF-2: true  # Attribution to document sections
  SF-3: true
  SS-1: true
  SS-2: true  # GDPR - PII in documents critical
  SS-3: true
  SS-4: true
  TI-1: true
  TI-2: true
  TI-3: true
  TI-4: true
  IQ-1: true
  IQ-2: true
  IQ-3: true
  IQ-4: true

metric_overrides:
  SS-2:
    threshold: 0.0005 # Stricter PII threshold (GDPR)
    pii_categories_extra: [EU_NATIONAL_ID, IBAN, PASSPORT_NUMBER]
  SF-2:
    attribution_method: "section_citation"  # Cite document section, not URL
  IQ-2:
    threshold: 4000 # Longer docs = longer generation; relaxed latency

paper_reported_scores:
  FC: 8.2
  RO: 6.8
  SF: 9.1 # Highest SF across all systems
  SS: 7.9
  TI: 7.5
  IQ: 8.6
  composite: 8.02

key_incidents_study_period: 10
qalis_detection_lag_mean_hours: 1.3
baseline_detection_lag_mean_hours: 4.9

notable_findings:
  - "SF dimension highest (9.1) - long-context grounding reduces hallucination significantly"
  - "SF-3 hallucination rate 0.8/1K tokens - lowest in cohort"
  - "IQ-2 relaxed threshold needed - 1M token context causes higher latency by design"
  - "GDPR compliance drove SS-2 PII threshold to 0.0005 (stricter than default)"
